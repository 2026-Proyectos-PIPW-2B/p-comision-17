<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
  <div class="container-fluid">
    <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col-md-9 col-lg-6 col-xl-5">
            <img 
            class="img-fluid" alt="Sample image">
        </div>
        <div class="col-md-8 col-lg-6 col-xl-4 offset-xl-1">

            <div class="card shadow mt-5" style="border-radius: 1rem;">
            <div class="card-body p-5">
        <form action="">
            
            <!-- Usuario input -->
        <div>
            <label for="text" class="form-label"></label>
            <input type="user" class="form-control form-control-lg" placeholder="Ingresa tu usuario">
                
        </div>

        <!-- Contraseña input -->
        <div>
            <label for="password" class="form-label">  </label>
            <input type="password" class="form-control form-control-lg" placeholder="Ingresa tu contraseña">                
        </div>

        <!-- Tipo de usuario input -->
        <div class="mt-3">
            <label for="text" class="form-label">Tipo de usuario:</label>
            <input type="text" class="form-control form-control-lg" disabled>                
        </div>

        <!-- Boton "Recuerdame" -->
        <div class="d-flex justify-content-between align-items-center">
        </div>

        <!-- Checkbox -->
        <div class="form-check mt-2">
            <input class="form-check-input me-2" type="checkbox" value="" id="checkBoxRecuerdame" />
            <label class="form-check-label" for="checkBoxRecuerdame">Recuérdame</label>
        </div>
        
        <!-- Boton "Login" -->
        <div class="text-center text-lg-start mt-3">
            <button  type="button" class="btn btn-primary btn-lg w-100"
              style="background-color: #0d6efd;">Login</button>
            <p class="small fw-bold mt-2 text-center">¿No tenés cuenta aún?<a href="#!"
                class="link-danger m-2">Crear cuenta</a></p>
        </div>

        <!-- Botones de red social -->
         <div class="text-center">
            <p>O puede ingresar con:</p>
            
            <button type="button" id="btnFacebook" data-mdb-button-init data-mdb-ripple-init class="btn btn-link btn-floating mx-1">
                <i class="fab fa-facebook-f"></i>
            </button>

            <button  type="button" id="btnGoogle" data-mdb-button-init data-mdb-ripple-init class="btn btn-link btn-floating mx-1">
                <i class="fab fa-google"></i>
            </button>

            <button  type="button" id="btnGithub" data-mdb-button-init data-mdb-ripple-init class="btn btn-link btn-floating mx-1">
                <i class="fab fa-github"></i>
            </button>
         </div>
        </div>
         
        </form>
        </div>
        </div>
    </div>
  </div>
</div>
</body>
</html>
