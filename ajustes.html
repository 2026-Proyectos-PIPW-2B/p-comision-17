<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Librarium | Ajustes</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/admin.css" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playpen+Sans+Hebrew:wght@100..800&family=Playwrite+ID&family=Questrial&family=Shadows+Into+Light+Two&display=swap');
    </style>
  </head>

  <body style="font-family: &quot;Questrial&quot;, sans-serif">
    <header>
      <nav class="navbar bg-primary p-4 fw-bold">
        <div class="container-fluid position-relative">
          <button
            class="btn btn-outline-light d-lg-none position-absolute start-0 top-50 translate-middle-y ms-3"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#sidebar"
          >
            ☰
          </button>

          <div class="w-100 text-center text-lg-start">
            <section>
              <a href="index.html">
                <img
                  src="img/logo-reducido.png"
                  alt="Logo de Librarium"
                  class="img-fluid"
                  style="width: 40px"
                />
              </a>
            </section>
          </div>
        </div>
      </nav>
    </header>

    <div class="container-fluid">
      <div class="row min-vh-100">
        <!-- ==================== SIDEBAR ==================== -->

        <aside
          class="offcanvas-lg offcanvas-start col-lg-2 border-end p-3 bg-secondary"
          tabindex="-1"
          id="sidebar"
        >
          <nav class="d-flex flex-column h-100">
            <a href="admin.html" class="nav-link p-3">
              Panel de administación</a
            >
            <a href="historial-pedidos.html" class="nav-link p-3">
              Historial de pedidos
            </a>

            <!-- Acordion Productos-->

            <div
              class="accordion accordion-flush bg-secondary"
              id="menuProductos"
            >
              <div class="accordion-item bg-secondary border-0">
                <h2 class="accordion-header">
                  <button
                    class="accordion-button collapsed bg-secondary nav-link"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#collapseProductos"
                  >
                    Productos
                  </button>
                </h2>

                <div
                  id="collapseProductos"
                  class="accordion-collapse collapse mb-4"
                >
                  <div class="accordion-body mb-2 bg-secondary">
                    <a href="gestion-categorias.html" class="nav-link p-3">
                      Gestión categorías
                    </a>

                    <a href="gestion-stock.html" class="nav-link p-3">
                      Gestión stock
                    </a>
                  </div>
                </div>
              </div>
            </div>

            <!-- Acordion Usuarios-->

            <div class="accordion accordion-flush bg-secondary" id="menuAdmin">
              <div class="accordion-item bg-secondary border-0">
                <h2 class="accordion-header">
                  <button
                    class="accordion-button collapsed bg-secondary nav-link p-3"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#collapseUsuarios"
                  >
                    Usuarios
                  </button>
                </h2>

                <div
                  id="collapseUsuarios"
                  class="accordion-collapse collapse mb-4"
                >
                  <div class="accordion-body mb-2 bg-secondary">
                    <a href="nuevo-admin.html" class="nav-link p-3">
                      Usuarios Administradores
                    </a>

                    <a href="gestion-clientes.html" class="nav-link p-3">
                      Gestión de clientes
                    </a>
                  </div>
                </div>
              </div>
            </div>

            <a href="ajustes.html" class="nav-link p-3"> Ajustes </a>

            <a
              href="#"
              id="btn-cerrarSesion"
              class="mt-auto fw-bold px-3 text-info"
            >
              Cerrar sesión
            </a>
          </nav>
          <button
            type="button"
            class="btn-close d-lg-none position-absolute bottom-0 end-0 m-3"
            onclick="
              bootstrap.Offcanvas.getInstance(
                document.getElementById('sidebar'),
              ).hide()
            "
            aria-label="Close"
          ></button>
        </aside>

        <main class="col-12 col-lg-10 p-4">
          <h1 class="display-4 fw-bold text-center p-4">Ajustes</h1>
          <hr class="my-3" />

          <section class="container-fluid">
            <!-- PERFIL -->

            <section>
              <h2 class="h4 mb-4">Mi Perfil</h2>

              <div class="row align-items-center g-4">
                <!-- FOTO -->

                <div class="col-md-3 text-center">
                  <img
                    id="fotoPerfil"
                    src="../img/avatar-default.png"
                    alt="Foto"
                    class="rounded-circle border img-fluid mb-3 p-4"
                    width="200"
                    height="200"
                  />

                  <input
                    type="file"
                    id="inputFotoPerfil"
                    class="form-control"
                    accept="image/*"
                  />
                </div>

                <!-- DATOS -->

                <div class="col-md-9">
                  <div class="mb-3">
                    <label for="nombreUsuario" class="form-label">
                      Nombre
                    </label>

                    <input
                      type="text"
                      class="form-control"
                      id="nombreUsuario"
                      placeholder="Nombre del usuario"
                    />
                  </div>

                  <div class="mb-3">
                    <label for="emailUsuario" class="form-label">
                      Correo electrónico
                    </label>

                    <input
                      type="email"
                      class="form-control"
                      id="emailUsuario"
                      placeholder="correo@ejemplo.com"
                    />
                  </div>

                  <button class="btn btn-primary" id="btnGuardarPerfil">
                    Guardar cambios
                  </button>
                </div>
              </div>
            </section>

            <hr class="my-5" />

            <!-- SEGURIDAD -->

            <section>
              <h2 class="h4 mb-4">Seguridad</h2>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="nuevaContrasena" class="form-label">
                    Nueva contraseña
                  </label>

                  <input
                    type="password"
                    class="form-control"
                    id="nuevaContrasena"
                  />
                </div>

                <div class="col-md-6 mb-3">
                  <label for="confirmarContrasena" class="form-label">
                    Confirmar contraseña
                  </label>

                  <input
                    type="password"
                    class="form-control"
                    id="confirmarContrasena"
                  />
                </div>
              </div>

              <button class="btn btn-primary" id="btnActualizarContrasena">
                Actualizar contraseña
              </button>
            </section>

            <hr class="my-5" />

            <!-- INFORMACIÓN DE LA CUENTA -->

            <section>
              <h2 class="h4 mb-4">Información de la cuenta</h2>

              <div class="row">
                <div class="col-md-6">
                  <p>
                    <strong>Rol:</strong>
                    <span id="rolUsuario"> Administrador </span>
                  </p>
                </div>

                <div class="col-md-6">
                  <p>
                    <strong>Fecha de registro:</strong>
                    <span id="fechaRegistro"> 15/06/2026 </span>
                  </p>
                </div>
              </div>
            </section>

            <hr class="my-5" />

            <!-- SESIÓN -->

            <section>
              <h2 class="h4 mb-4">Sesión</h2>

              <button class="btn btn-outline-danger" id="btnCerrarSesion">
                Cerrar sesión
              </button>
            </section>
          </section>
        </main>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./js/sesion.js"></script>
  </body>
</html>
